#Execute on boot
exec-once = hyprpaper
exec-once = waybar
exec-once = mako
exec-once = openbubbles-app-bin
#I needed this to make polkit authentication work on non KDE
exec-once = /usr/lib/polkit-kde-authentication-agent-1

#This allows gnome-keyring to unlock on startup
exec-once = dbus-update-activation-environment --systemd --all
#Tells hyprland to respect nwg-displays rules
source = ~/.config/hypr/monitors.conf

$mainMod = SUPER
#Default applications
$browser = brave
$terminal = foot
$fileManager = dolphin
$menu = rofi -show drun -modes drun,calc -theme ~/.config/rofi/launcher.rasi -hover-select -kb-element-next "" -kb-mode-next "Tab"
#Execution controls
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive
bind = $mainMod, I, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, H, exec, hyprlock & sleep 1 && systemctl hibernate
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu,
bind = $mainMod, F, exec, $browser

#Logitech MXKeys specific keybinds
bind = , XF86Calculator, exec, rofi -show calc -theme ~/.config/rofi/launcher.rasi

#minimize controls
bind = $mainMod, S, togglespecialworkspace, minimized
bind = $mainMod SHIFT, S, movetoworkspacesilent, special:minimized

#Window managment controls
binde = $mainMod SHIFT, right, resizeactive, 30 0
binde = $mainMod SHIFT, left, resizeactive, -30 0
binde = $mainMod SHIFT, up, resizeactive, 0 -30
binde = $mainMod SHIFT, down, resizeactive, 0 30

#Window rules

#openbubbles should be on workspace 4
windowrule {
    name = openbubbles-workspace
    match:class = ^(bluebubbles)$
    workspace = 4
}

#Signal should be on workspace 4

#PIP floats and gets pinned
windowrule {
    name = browser_pip
    match:title = ^([Pp]icture[- ]in[- ]picture|[Pp]icture-in-[Pp]icture)$
    float = 1
    pin = 1
    keep_aspect_ratio = 1
}

#Enables mouse control to move and resize windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#Workspace switching 1-10
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

#volume controls and playback controls
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioPause, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous

# Brightness control
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Screenshot
bind = , Print, exec, grim - | wl-copy
# Capture a selected region to clipboard
bind = SUPER SHIFT, A, exec, grim -g "$(slurp)" - | wl-copy

